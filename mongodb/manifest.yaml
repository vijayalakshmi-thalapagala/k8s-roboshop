apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: db
    component: mongodb
  annotations:
    kubernetes.io/change-cause: "starting with to 1.0.0"
spec:
  replicas: 2
  selector:
    # using these labels replica set selects the pod
    matchLabels:
      project: roboshop
      tier: db
      component: mongodb
  # This is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mongodb
    spec:
      containers:
      - name: mongodb
        image: vijayalakshmitv/mongodb:1.0.0
-----
apiVersion: v1
kind: Service
metadata: 
  name: mongodb
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  selector: 
    project: roboshop
    tier: db
    component: mongodb
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017